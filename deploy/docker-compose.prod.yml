services:
  league:
    image: ${IMAGE}
    restart: unless-stopped
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - HOST_HEADER=x-forwarded-host
      - PROTOCOL_HEADER=x-forwarded-proto
      - PORT_HEADER=x-forwarded-port
      - DB_PATH=/app/data/league.db
    volumes:
      - /opt/league/data:/app/data
    expose:
      - "3000"
    networks:
      - web

networks:
  web:
    external: true
    name: deploy_default
