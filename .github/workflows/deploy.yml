name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      CI: true
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_sha: ${{ steps.meta.outputs.image_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: meta
        run: |
          repo_lc="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "image_sha=ghcr.io/${repo_lc}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}

      - name: Trust host key
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Sync deploy files to server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
        run: |
          ssh root@"$HETZNER_HOST" '
            set -e
            mkdir -p /opt/league/deploy /opt/league/data
            if ! command -v rsync >/dev/null 2>&1; then
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y
              apt-get install -y rsync
            fi
          '
          rsync -az --delete deploy/ root@"$HETZNER_HOST":/opt/league/deploy/

      - name: Deploy on server
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          IMAGE: ${{ needs.build-and-push.outputs.image_sha }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh root@"$HETZNER_HOST" \
            "IMAGE='$IMAGE' \
             GHCR_USER='$GHCR_USER' \
             GHCR_TOKEN='$GHCR_TOKEN' \
             bash -s" < deploy/remote-deploy.sh
